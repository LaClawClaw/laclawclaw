<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LACLAWCLAW — Coming Soon</title>
  <meta name="description" content="Sharpening our claws. Coming soon.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .logo {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0.15em;
      margin-bottom: 2.5rem;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: clamp(1rem, 3vw, 1.35rem);
      color: #999;
      line-height: 1.6;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .tagline .highlight {
      color: #e0e0e0;
      font-weight: 500;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #333;
      margin: 1.8rem auto;
    }

    .cta {
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2.5rem;
    }

    /* subtle claw scratch marks */
    body::before {
      content: '';
      position: fixed;
      top: 15%;
      right: 8%;
      width: 120px;
      height: 300px;
      background: repeating-linear-gradient(
        165deg,
        transparent,
        transparent 28px,
        rgba(255,255,255,0.015) 28px,
        rgba(255,255,255,0.015) 30px
      );
      transform: rotate(-10deg);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: 10%;
      left: 5%;
      width: 80px;
      height: 200px;
      background: repeating-linear-gradient(
        170deg,
        transparent,
        transparent 22px,
        rgba(255,255,255,0.01) 22px,
        rgba(255,255,255,0.01) 24px
      );
      transform: rotate(5deg);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">LACLAWCLAW</h1>
    <p class="tagline">Sharpening our claws. <span class="highlight">Coming soon.</span></p>
    <div class="divider"></div>
    <p class="tagline">We're not ready yet.<br>But <span class="highlight">your agent</span> will be.</p>
    <p class="cta">Stay sharp</p>
  </div>
</body>
</html>
